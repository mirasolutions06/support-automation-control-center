name: Feature request
description: Suggest a capability, workflow, integration, or documentation improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: goal
    attributes:
      label: What should this help someone do?
      description: Describe the support workflow and outcome.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
      description: Share the smallest useful version if you have one.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional context on other ways to solve it.
